[tools]
go = "1.26.0"
atlas = "1.1.0"
"npm:commitlint" = "19.8.1"
"npm:lefthook" = "1.11.14"
"npm:prettier" = "3.5.3"

[hooks]
postinstall = "lefthook install"

[tasks.install-tools]
description = "Install Go tools"
run = [
  "go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1",
  "go install golang.org/x/tools/gopls@v0.21.1",
  "go install github.com/go-delve/delve/cmd/dlv@v1.26.0",
  "go install github.com/air-verse/air@v1.64.5",
]

[tasks.db-exec]
description = "Open a MySQL shell in the database container"
run = ["docker compose exec db mysql -uroot -prootpassword example"]

[tasks.atlas-inspect]
description = "Inspect the database schema and generate the atlas file"
run = ["atlas schema inspect --env local"]

[tasks.atlas-apply]
description = "Run database migrations"
run = ["atlas schema apply --env local"]

[env]
DB_HOST = "localhost"
DB_PORT = "3306"
DB_USER = "root"
DB_PASSWORD = "rootpassword"
DB_NAME = "example"
